appId: com.neda420.postureguard.desktop
productName: PostureGuard

directories:
  output: dist

files:
  - out/**/*
  - main.js
  - preload.js
  - package.json
  - models/**/*
  - public/models/**/*

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  artifactName: ${productName}-Setup-${version}.${ext}
