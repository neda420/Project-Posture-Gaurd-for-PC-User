name: 🐛 Bug Report
description: Report a reproducible bug
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!  
        Please fill in as much detail as possible so we can reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open the app
        2. Enable camera
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Electron app (desktop)
        - posture-guard-sdk (npm package)
        - CI / build
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: sdk-version
    attributes:
      label: SDK version (if applicable)
      placeholder: "1.0.0"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS 14 / Ubuntu 22.04"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "20.x"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / error output
      render: shell
